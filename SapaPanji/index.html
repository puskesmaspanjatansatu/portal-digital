<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>SAPA PANJI V2</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:#020617;
}

/* IFRAME */

iframe{
position:fixed;
inset:0;
width:100%;
height:100%;
border:none;
}

/* LOADER */

.loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;

background:radial-gradient(circle at top,#0ea5e9,#020617 70%);
z-index:9999;
transition:.6s;
}

.hide{
opacity:0;
visibility:hidden;
}

.card{
width:92%;
max-width:420px;
padding:30px 25px;
text-align:center;
border-radius:30px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid #38bdf833;

color:#e0f2fe;
box-shadow:0 20px 60px #0008;
}

/* ICON */

.icon{
width:90px;
height:90px;
margin:auto;
border-radius:50%;

background:linear-gradient(135deg,#0ea5e9,#10b981);

display:flex;
align-items:center;
justify-content:center;

font-size:40px;
color:white;

box-shadow:0 0 30px #0ea5e966;
animation:pulse 2s infinite;
}

/* TEXT */

h1{
margin-top:18px;
font-size:1.6rem;
color:#7dd3fc;
}

p{
margin-top:10px;
font-size:.95rem;
color:#e0f2fe;
line-height:1.6;
}

/* PROGRESS */

.progress{
margin-top:20px;
height:8px;
border-radius:20px;
background:#0c4a6e;
overflow:hidden;
}

.bar{
height:100%;
width:40%;
background:#38bdf8;
animation:load 1.2s infinite;
}

/* FALLBACK BUTTON */

.fallback{
margin-top:18px;
display:none;
}

.fallback a{
display:inline-block;
padding:10px 16px;
border-radius:10px;
background:#10b981;
color:white;
text-decoration:none;
font-size:.9rem;
}

/* ANIMATION */

@keyframes load{
0%{transform:translateX(-120%)}
100%{transform:translateX(300%)}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.1);}
}

/* ========================= */
/* BACK HOME BUTTON */
/* ========================= */

.back-home{
position:fixed;
right:18px;
bottom:18px;

width:58px;
height:58px;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

background:linear-gradient(135deg,#0ea5e9,#10b981);

color:white;
text-decoration:none;
font-size:24px;

z-index:99999;

box-shadow:0 10px 25px rgba(0,0,0,.4);

transition:.25s;
}

.back-home:hover{
transform:translateY(-4px) scale(1.05);
}

.back-home:active{
transform:scale(.9);
}

.back-home::after{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:rgba(255,255,255,.4);
transform:scale(0);
opacity:0;
transition:.4s;
}

.back-home:active::after{
transform:scale(1.6);
opacity:1;
transition:0s;
}

/* MOBILE */

@media(max-width:600px){
.back-home{
width:50px;
height:50px;
font-size:20px;
right:14px;
bottom:14px;
}
}

</style>
</head>

<body>

<!-- IFRAME -->

<iframe
id="app"
src="https://script.google.com/a/~/macros/s/AKfycbwRWrby065ZCgATSzSyIWH6Pkqi6euB-eGGsaS9eZ7DW9WZAR--QNfXMnpIznKWIsi8KQ/exec">
</iframe>

<!-- LOADER -->

<div class="loader" id="loader">

<div class="card">

<div class="icon">💬</div>

<h1>SAPA PANJI</h1>

<p>
Aspirasi & Pengaduan<br>
Puskesmas Panjatan I
</p>

<div class="progress">
<div class="bar"></div>
</div>

<p id="status">Memuat aplikasi...</p>

<div class="fallback" id="fallback">
<a href="https://script.google.com/a/~/macros/s/AKfycbwRWrby065ZCgATSzSyIWH6Pkqi6euB-eGGsaS9eZ7DW9WZAR--QNfXMnpIznKWIsi8KQ/exec">
Buka Langsung
</a>
</div>

</div>

</div>

<!-- BACK HOME -->

<a href="https://puskesmaspanjatansatu.github.io/portal-digital/" class="back-home">
🏠
</a>

<!-- SCRIPT -->

<script>

const loader = document.getElementById("loader");
const fallback = document.getElementById("fallback");
const statusText = document.getElementById("status");

// jika iframe berhasil load
document.getElementById("app").onload = function(){
setTimeout(()=>{
loader.classList.add("hide");
},500);
};

// fallback jika gagal
setTimeout(()=>{
statusText.innerText = "Jika tidak terbuka, klik tombol di bawah";
fallback.style.display = "block";
},5000);

// hide paksa
setTimeout(()=>{
loader.classList.add("hide");
},8000);

</script>

</body>
</html>
