<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Dashboard CKG | Puskesmas Panjatan I</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:linear-gradient(160deg,#020617,#0f172a,#020617);
font-family:'Segoe UI',system-ui,sans-serif;
overflow:hidden;
}

/* iframe */

iframe{
position:fixed;
inset:0;
width:100%;
height:100%;
border:0;
background:#fff;
}

/* loader */

#loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
background:radial-gradient(circle at top,#0f766e,#020617 70%);
transition:.6s;
}

.hide{
opacity:0;
visibility:hidden;
}

/* CARD */

.card{
width:92%;
max-width:380px;
padding:30px;
border-radius:26px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);

color:#e2e8f0;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,.5);
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.dot{
width:10px;
height:10px;
background:#34d399;
border-radius:50%;
box-shadow:0 0 12px #34d399;
animation:pulse 1.8s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);opacity:1}
50%{transform:scale(1.6);opacity:.5}
}

.label{
font-size:12px;
color:#94a3b8;
letter-spacing:1px;
}

/* CHART */

.chart{
margin:25px 0;
height:90px;
position:relative;
}

svg{
width:100%;
height:100%;
}

.path{
fill:none;
stroke:#2dd4bf;
stroke-width:3;
stroke-linecap:round;
stroke-dasharray:300;
stroke-dashoffset:300;
animation:draw 2s ease forwards;
}

@keyframes draw{
to{stroke-dashoffset:0}
}

/* floating glow */

.glow{
position:absolute;
width:120px;
height:120px;
background:#14b8a6;
filter:blur(80px);
opacity:.25;
top:-40px;
right:-40px;
animation:float 5s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(20px)}
}

/* TEXT */

h1{
font-size:20px;
color:#5eead4;
margin-top:10px;
}

p{
margin-top:10px;
font-size:14px;
color:#cbd5f5;
}

/* PROGRESS */

.progress{
margin-top:20px;
height:5px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:40%;
background:linear-gradient(90deg,#2dd4bf,#34d399);
animation:load 1.4s infinite;
}

@keyframes load{
0%{transform:translateX(-120%)}
100%{transform:translateX(300%)}
}

/* HOME */

.home{
position:fixed;
bottom:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(15,23,42,.6);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(10px);
z-index:99999;
transition:.3s;
}

.home:hover{
background:#14b8a6;
transform:translateY(-3px);
}

.home svg{
width:24px;
fill:#fff;
}

</style>

</head>

<body>

<iframe
id="app"
src="https://script.google.com/a/~/macros/s/AKfycbxPRwoo-0181QlDlzRBRoLvIbc_GA177ynpeQja9Ks6UcJqeGzkj_xBuH27tUvATOrtfg/exec">
</iframe>

<div id="loader">

<div class="card">

<div class="glow"></div>

<div class="header">
<span class="label">SYSTEM CKG</span>
<div class="dot"></div>
</div>

<div class="chart">
<svg viewBox="0 0 100 50">
<path class="path" d="M0 40 L20 30 L40 35 L60 20 L80 25 L100 10"/>
</svg>
</div>

<h1>DASHBOARD CKG</h1>

<p>
Cek Kesehatan Gratis<br>
Puskesmas Panjatan I
</p>

<div class="progress">
<div class="bar"></div>
</div>

<p>Memuat data kesehatan...</p>

</div>

</div>

<!-- HOME -->

<a href="https://puskesmaspanjatansatu.github.io/portal-digital/" class="home">
<svg viewBox="0 0 24 24">
<path d="M12 3.1 2.6 11a1 1 0 0 0 .64 1.77H5v7a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-7h1.76A1 1 0 0 0 21.4 11L12 3.1z"/>
</svg>
</a>

<script>

const loader=document.getElementById("loader");

document.getElementById("app").onload=()=>{
setTimeout(()=>loader.classList.add("hide"),400);
};

setTimeout(()=>loader.classList.add("hide"),8000);

</script>

</body>
</html>
