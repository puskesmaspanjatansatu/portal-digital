<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>e-Portal Digital | Puskesmas Panjatan I</title>

<meta name="theme-color" content="#0f766e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="e-Portal Digital">

<link rel="manifest" href="manifest.json">

<!-- PERCEPAT LOAD: warmup koneksi ke semua origin yang dipakai portal GAS -->
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.googleusercontent.com">
<link rel="preconnect" href="https://cdn.tailwindcss.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://drive.google.com">
<link rel="preconnect" href="https://lh3.googleusercontent.com">
<link rel="dns-prefetch" href="//ssl.gstatic.com">

<style>

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#0f172a;
}

body{position:fixed;inset:0}

.iframe-container{
  position:fixed;inset:0;
  width:100vw;height:100dvh;
  background:#fff;
  overflow:hidden;
  /* Safe-area: navbar portal tidak tertutup status bar / gesture bar */
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px);
}

iframe{
  position:absolute;
  top:env(safe-area-inset-top,0px);
  left:0;right:0;
  bottom:env(safe-area-inset-bottom,0px);
  width:100%;
  height:calc(100% - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px));
  border:none;background:#fff;display:block;
}

/* ============ SPLASH (minimalis, identitas teal/emerald portal) ============ */

.loader-screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:22px;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(20,184,166,.28), transparent 60%),
    linear-gradient(160deg,#0f172a 0%,#0f2e2b 55%,#134e4a 100%);
  z-index:9999;
  transition:opacity .35s ease,visibility .35s ease;
}

/* Logo: kotak gradasi teal→emerald dengan tanda plus (selaras logo navbar portal) */
.logo-mark{
  width:76px;height:76px;
  border-radius:22px;
  display:flex;justify-content:center;align-items:center;
  background:linear-gradient(135deg,#14b8a6,#059669);
  box-shadow:
    0 12px 32px rgba(13,148,136,.45),
    inset 0 1px 0 rgba(255,255,255,.25);
  animation:breathe 2.4s ease-in-out infinite;
}
.logo-mark svg{width:38px;height:38px;fill:#fff}

@keyframes breathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}

.brand{text-align:center}
.brand h1{
  font-size:1.45rem;font-weight:700;
  color:#f0fdfa;letter-spacing:.3px;
}
.brand p{
  margin-top:6px;
  font-size:.72rem;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;
  color:#5eead4;
}

/* Garis progress tipis */
.progress{
  width:180px;height:3px;
  border-radius:99px;overflow:hidden;
  background:rgba(255,255,255,.12);
}
.progress-bar{
  width:40%;height:100%;
  border-radius:99px;
  background:linear-gradient(90deg,#2dd4bf,#34d399);
  animation:slide 1.1s ease-in-out infinite;
}
@keyframes slide{
  0%{transform:translateX(-120%)}
  100%{transform:translateX(420%)}
}

.loader-hint{
  font-size:.72rem;color:#94a3b8;
  opacity:0;transition:opacity .5s ease;
}
.loader-hint.show{opacity:1}

.fade-out{opacity:0;visibility:hidden;pointer-events:none}

/* ============ TOMBOL KEMBALI (glass, tidak mencolok) ============ */

.back-home{
  position:fixed;
  right:calc(18px + env(safe-area-inset-right,0px));
  bottom:calc(18px + env(safe-area-inset-bottom,0px));
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:rgba(15,23,42,.55);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;text-decoration:none;
  z-index:99999;
  box-shadow:0 8px 24px rgba(0,0,0,.28);
  transition:transform .25s ease,box-shadow .25s ease,background .25s ease;
}
.back-home svg{width:20px;height:20px;fill:#fff;opacity:.9}
.back-home:hover{
  transform:translateY(-3px);
  background:rgba(13,148,136,.85);
  box-shadow:0 12px 28px rgba(13,148,136,.4);
}

@media(max-width:600px){
  .back-home{
    right:calc(14px + env(safe-area-inset-right,0px));
    bottom:calc(14px + env(safe-area-inset-bottom,0px));
    width:44px;height:44px;
  }
  .back-home svg{width:18px;height:18px}
}

</style>

</head>

<body>

<div class="iframe-container">

  <div class="loader-screen" id="loader">

    <div class="logo-mark">
      <!-- Tanda plus kesehatan -->
      <svg viewBox="0 0 24 24"><path d="M10 3h4a1 1 0 0 1 1 1v5h5a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-5v5a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-5H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h5V4a1 1 0 0 1 1-1z"/></svg>
    </div>

    <div class="brand">
      <h1>e-Portal Digital</h1>
      <p>Puskesmas Panjatan I</p>
    </div>

    <div class="progress"><div class="progress-bar"></div></div>

    <div class="loader-hint" id="loaderHint">Koneksi lambat? Portal sedang disiapkan...</div>

  </div>

  <!-- FIX LINK DIBLOKIR:
       + allow-popups-to-escape-sandbox : tab baru TIDAK mewarisi sandbox
       + allow-top-navigation-by-user-activation : izinkan navigasi keluar via klik user -->
  <iframe
  id="appFrame"
  src="https://script.google.com/macros/s/AKfycbyq2VJNosxfGQ6CEkYVCL8gZ11pPfvhJAnCqhlpXk8h7BvqDVh-SmzcYKErj_Osgtui_Q/exec?v=2"
  allow="geolocation *; camera *; microphone *; clipboard-write *; fullscreen *"
  sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-forms allow-modals allow-downloads"
  loading="eager"
  referrerpolicy="no-referrer"
  allowfullscreen
  onload="hideLoader()">
  </iframe>

</div>

<!-- Tombol kembali ke Portal Digital -->
<a
href="https://puskesmaspanjatansatu.github.io/portal-digital/"
class="back-home"
title="Kembali ke Portal Digital"
aria-label="Kembali ke Portal Digital">
  <svg viewBox="0 0 24 24"><path d="M12 3.1 2.6 11a1 1 0 0 0 .64 1.77H5v7.13a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-7.13h1.76A1 1 0 0 0 21.4 11L12 3.1z"/></svg>
</a>

<script>

var loaderHidden = false;

function hideLoader(){
  if (loaderHidden) return;
  loaderHidden = true;
  // PERCEPAT: sembunyikan splash segera saat iframe siap (tanpa delay tambahan)
  document.getElementById('loader').classList.add('fade-out');
}

// Setelah 6 detik: tampilkan hint koneksi lambat
setTimeout(function(){
  if (!loaderHidden) document.getElementById('loaderHint').classList.add('show');
}, 6000);

// Failsafe 15 detik: jangan biarkan pengguna terkunci di splash
setTimeout(hideLoader, 15000);

/* JEMBATAN LINK EKSTERNAL (Fix Firefox NS_ERROR_DOM_COOP_FAILED)
   Portal GAS di dalam iframe mengirim permintaan buka-link ke halaman ini.
   Karena halaman ini TIDAK ter-sandbox, tab baru yang dibuka dari sini
   bersih dari flag sandbox → situs ber-COOP (drive.google.com, kemkes.go.id,
   SRIKANDI) terbuka normal di semua browser. */
window.addEventListener('message', function(ev){

  var d = ev.data;
  if (!d || typeof d !== 'object') return;

  // Hanya terima pesan dari konteks Google Apps Script
  var okOrigin = /https:\/\/([a-z0-9-]+\.)*(googleusercontent\.com|google\.com)$/i.test(ev.origin || '');
  if (!okOrigin) return;

  if (d.type === 'portal-shell-ping') {
    try { ev.source.postMessage({ type: 'portal-shell-pong' }, '*'); } catch(e){}
    return;
  }

  if (d.type === 'portal-open-url') {
    var url = String(d.url || '').trim();
    if (!/^https?:\/\//i.test(url)) return; // keamanan: hanya http/https

    var a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ a.remove(); }, 100);
  }

});

if ('serviceWorkear' in navigator) {

window.addEventListener('load', () => {

// Pola sub-layanan portal-digital: sw.js berada di folder induk.
navigator.serviceWorker
.register('../sw.js')
.catch(err => console.log(err));

});

}

</script>

</body>
</html>
