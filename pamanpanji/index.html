<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}



html,body{

width:100%;
height:100%;

overflow:hidden;

font-family:'Segoe UI',sans-serif;

background:#020617;

}




iframe{

position:fixed;

inset:0;

width:100%;

height:100%;

border:0;

}





/* SPLASH */


#loader{


position:fixed;

inset:0;

z-index:9999;


display:flex;

align-items:center;

justify-content:center;



background:

radial-gradient(
circle at top,
#059669,
#022c22 65%,
#020617
);



transition:.4s;


}



.hide{

opacity:0;

visibility:hidden;

}




.card{


width:90%;

max-width:380px;


padding:35px 25px;


text-align:center;


border-radius:30px;



background:

rgba(255,255,255,.10);



backdrop-filter:

blur(20px);




border:

1px solid #ffffff22;




box-shadow:

0 20px 60px #0008;



color:white;


}






/* ICON */

.icon{


width:95px;

height:95px;



margin:auto;



border-radius:30px;




display:flex;

align-items:center;

justify-content:center;




background:

linear-gradient(
135deg,
#34d399,
#06b6d4
);



box-shadow:

0 0 45px #10b98188;




animation:

float 3s infinite;


}



.icon svg{


width:58px;

fill:white;


}



@keyframes float{


50%{

transform:translateY(-8px);

}


}





h1{


margin-top:20px;


font-size:28px;


font-weight:800;


}



p{


margin-top:12px;


color:#d1fae5;


line-height:1.7;


}





.location{


margin-top:15px;


font-size:13px;


letter-spacing:2px;



font-weight:600;



color:#67e8f9;


}






.tag{


margin-top:10px;


font-size:12px;


color:#a7f3d0;


font-style:italic;


}





.progress{


margin-top:25px;


height:7px;


background:#ffffff33;


border-radius:20px;


overflow:hidden;


}




.bar{


height:100%;


width:40%;



background:white;



animation:

load 1.2s infinite;


}




@keyframes load{


0%{

transform:translateX(-120%);

}


100%{

transform:translateX(300%);

}


}




</style>
