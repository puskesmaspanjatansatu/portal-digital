<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>e-Portal Digital | Puskesmas Panjatan I</title>

<meta name="theme-color" content="#0f766e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="e-Portal Digital">

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://cdn.tailwindcss.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: #0f172a;
  }

  /* Background selaras dengan identitas Puskesmas / e-Portal */
  .bg-portal {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(20,184,166,.28), transparent 60%),
      linear-gradient(160deg, #0f172a 0%, #0f2e2b 55%, #134e4a 100%);
    z-index: 1;
  }

  /* Logo Animation */
  .logo-mark {
    width: 86px; height: 86px;
    border-radius: 24px;
    display: flex; justify-content: center; align-items: center;
    background: linear-gradient(135deg, #14b8a6, #059669);
    box-shadow:
      0 16px 40px rgba(13,148,136,.5),
      inset 0 1px 0 rgba(255,255,255,.3);
    animation: float 3s ease-in-out infinite;
    margin: 0 auto 24px auto;
  }
  .logo-mark svg { width: 44px; height: 44px; fill: #fff; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.02); }
  }

  /* Glassmorphism Card */
  .glass-card {
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    z-index: 2;
  }

  /* Tombol Utama (Buka Portal) */
  .btn-primary {
    background: linear-gradient(135deg, #0d9488, #047857);
    box-shadow: 0 10px 25px -5px rgba(20, 184, 166, 0.4), 0 8px 10px -6px rgba(20, 184, 166, 0.1);
    transition: all 0.3s ease;
  }
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 25px -5px rgba(20, 184, 166, 0.5), 0 8px 10px -6px rgba(20, 184, 166, 0.1);
    background: linear-gradient(135deg, #14b8a6, #059669);
  }

  /* Tombol Kembali (Home) */
  .back-home {
    position: fixed;
    right: calc(20px + env(safe-area-inset-right, 0px));
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #fff;
    z-index: 99;
    box-shadow: 0 10px 25px rgba(0,0,0,.3);
    transition: all 0.3s ease;
  }
  .back-home svg { width: 22px; height: 22px; fill: #fff; opacity: 0.9; }
  .back-home:hover {
    transform: translateY(-4px) scale(1.05);
    background: rgba(13, 148, 136, 0.9);
    border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 15px 30px rgba(13,148,136,.4);
  }

</style>
</head>
<body>

<div class="bg-portal px-6">
  
  <div class="glass-card max-w-md w-full rounded-[2rem] p-8 sm:p-10 text-center transform transition-all">
    
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M10 3h4a1 1 0 0 1 1 1v5h5a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-5v5a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-5H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h5V4a1 1 0 0 1 1-1z"/></svg>
    </div>

    <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">
      e-Portal Digital
    </h1>
    <p class="text-teal-400 text-xs sm:text-sm font-bold tracking-[0.2em] uppercase mb-8">
      Puskesmas Panjatan I
    </p>

    <p class="text-slate-300 text-sm leading-relaxed mb-8">
      Demi menjaga keamanan dan privasi data instansi, aplikasi e-Portal akan dibuka pada jendela aman (Secure Tab) yang baru.
    </p>

    <a href="https://script.google.com/macros/s/AKfycbyq2VJNosxfGQ6CEkYVCL8gZ11pPfvhJAnCqhlpXk8h7BvqDVh-SmzcYKErj_Osgtui_Q/exec" 
       target="_blank" 
       rel="noopener noreferrer"
       class="btn-primary w-full inline-flex justify-center items-center gap-2 text-white font-bold py-4 px-6 rounded-2xl text-base">
      <span>Buka Aplikasi Portal</span>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
    </a>
    
  </div>

</div>

<a href="https://puskesmaspanjatansatu.github.io/portal-digital/" class="back-home" title="Kembali ke Beranda" aria-label="Kembali ke Beranda">
  <svg viewBox="0 0 24 24"><path d="M12 3.1 2.6 11a1 1 0 0 0 .64 1.77H5v7.13a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-7.13h1.76A1 1 0 0 0 21.4 11L12 3.1z"/></svg>
</a>

<script>
  // Mendaftarkan Service Worker untuk PWA jika diperlukan
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('../sw.js').catch(err => console.log('SW Registration failed:', err));
    });
  }
</script>

</body>
</html>
