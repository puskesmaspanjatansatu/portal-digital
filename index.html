<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>e-Portal Digital</title>

<meta name="theme-color" content="#0ea5e9">

<link rel="manifest" href="manifest.json">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#0ea5e9);
color:#fff;
min-height:100vh;
overflow:hidden;
}

/* HEADER */
.header{
padding:25px;
text-align:center;
transition:.4s;
}

.logo{
width:80px;
height:80px;
margin:auto;
border-radius:50%;
background:rgba(255,255,255,.1);
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
backdrop-filter:blur(20px);
}

.title{
font-size:1.6rem;
font-weight:700;
margin-top:15px;
}

.clock{
margin-top:10px;
font-size:.9rem;
opacity:.8;
}

/* GRID */
.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,.08);
padding:18px;
border-radius:20px;
text-align:center;
cursor:pointer;
transition:.3s;
backdrop-filter:blur(20px);
}

.card:hover{
transform:translateY(-6px) scale(1.02);
background:rgba(255,255,255,.15);
}

.icon{
font-size:28px;
margin-bottom:8px;
}

.name{
font-size:.9rem;
font-weight:600;
}

/* APP VIEW */
#appView{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
z-index:999;
}

.topbar{
background:#020617;
padding:12px;
display:flex;
align-items:center;
gap:10px;
}

.backBtn{
background:#0ea5e9;
border:none;
color:#fff;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
}

iframe{
flex:1;
width:100%;
border:none;
}

/* ANIMATION */
.fadeIn{
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0; transform:scale(.98)}
to{opacity:1; transform:scale(1)}
}

</style>
</head>

<body>

<div class="header">
<div class="logo">🏥</div>
<div class="title">e-Portal Digital</div>
<div class="clock" id="clock"></div>
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openApp('./ePortalDigital/')">
<div class="icon">🌐</div>
<div class="name">Portal</div>
</div>

<div class="card" onclick="openApp('./sigap/')">
<div class="icon">📍</div>
<div class="name">SIGAP</div>
</div>

<div class="card" onclick="openApp('./pamanpanji/')">
<div class="icon">👥</div>
<div class="name">PAMAN</div>
</div>

<div class="card" onclick="openApp('./ecuti/')">
<div class="icon">📅</div>
<div class="name">e-Cuti</div>
</div>

<div class="card" onclick="openApp('./pkg/')">
<div class="icon">🩺</div>
<div class="name">PKG</div>
</div>

<div class="card" onclick="openApp('./dashboard/')">
<div class="icon">📊</div>
<div class="name">Dashboard</div>
</div>

<div class="card" onclick="openApp('./keuangan/')">
<div class="icon">💰</div>
<div class="name">Keuangan</div>
</div>

<div class="card" onclick="openApp('./surat/')">
<div class="icon">📄</div>
<div class="name">Surat</div>
</div>

<div class="card" onclick="openApp('./jadwal/')">
<div class="icon">📆</div>
<div class="name">Jadwal</div>
</div>

</div>
</div>

<!-- APP VIEW -->
<div id="appView">
<div class="topbar">
<button class="backBtn" onclick="closeApp()">⬅️ Kembali</button>
<div id="appTitle"></div>
</div>
<iframe id="frame"></iframe>
</div>

<script>

// JAM
function updateClock(){
const now=new Date();
document.getElementById('clock').innerHTML =
now.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
+' • '+
now.toLocaleTimeString('id-ID');
}
setInterval(updateClock,1000);
updateClock();

// OPEN APP
function openApp(url){
document.getElementById('appView').style.display='flex';
document.getElementById('frame').src=url;
document.getElementById('appView').classList.add('fadeIn');
}

// CLOSE APP
function closeApp(){
document.getElementById('appView').style.display='none';
document.getElementById('frame').src='';
}

// PWA REGISTER
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
