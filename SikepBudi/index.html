<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>
Sistem Informasi Keuangan BLUD | Puskesmas Panjatan I
</title>

<meta name="theme-color" content="#16a34a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://script.google.com">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:#020617;
}

body{
position:fixed;
inset:0;
}

/* IFRAME */

iframe{
position:fixed;
inset:0;
width:100%;
height:100%;
border:none;
}

/* ========================= */
/* SPLASH SCREEN */
/* ========================= */

#loader{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#052e16,
#065f46,
#16a34a
);

z-index:9999;

transition:.5s;

}

.hide{
opacity:0;
visibility:hidden;
}

/* CARD */

.card{

width:90%;
max-width:380px;

padding:35px 25px;

text-align:center;

border-radius:30px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border:1px solid #ffffff22;

box-shadow:0 20px 60px rgba(0,0,0,.3);

color:white;

}

/* ICON MONEY */

.icon{

width:95px;
height:95px;

margin:auto;

border-radius:30px;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(135deg,#22c55e,#4ade80);

box-shadow:0 0 40px #22c55e88;

animation:float 3s infinite;

font-size:40px;

}

/* FLOAT */

@keyframes float{
50%{ transform:translateY(-8px); }
}

/* TEXT */

h1{
margin-top:20px;
font-size:26px;
font-weight:800;
}

p{
margin-top:12px;
color:#dcfce7;
line-height:1.7;
}

/* TAG */

.tag{
margin-top:10px;
font-size:12px;
color:#bbf7d0;
font-style:italic;
}

/* PROGRESS */

.progress{
margin-top:25px;
height:7px;
background:#ffffff33;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:40%;
background:white;
animation:load 1.2s infinite;
}

@keyframes load{
0%{ transform:translateX(-120%); }
100%{ transform:translateX(300%); }
}

/* ========================= */
/* BACK HOME BUTTON */
/* ========================= */

.back-home{

position:fixed;
right:20px;
bottom:20px;

width:60px;
height:60px;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

background:linear-gradient(135deg,#16a34a,#22c55e);

color:white;
text-decoration:none;
font-size:26px;

z-index:99999;

box-shadow:0 12px 30px rgba(0,0,0,.35);

overflow:hidden;
transition:.2s;

}

/* CLICK EFFECT */
.back-home:active{
transform:scale(.9);
}

/* RIPPLE */
.back-home::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(255,255,255,.4);
border-radius:50%;
transform:scale(0);
opacity:0;
transition:.4s;
}

.back-home:active::after{
transform:scale(1.6);
opacity:1;
transition:0s;
}

/* HOVER */
.back-home:hover{
transform:translateY(-5px) scale(1.05);
}

/* MOBILE */

@media(max-width:600px){
.back-home{
right:15px;
bottom:15px;
width:52px;
height:52px;
font-size:22px;
}
}

</style>

</head>

<body>

<!-- IFRAME APP -->

<iframe
id="app"
src="https://script.google.com/a/~/macros/s/AKfycby-BXYhuFMwv68DtmU6aK9pg1j_0xxL87-NLh85mTrBue-bDL6ieBrtVFYZTZhHG8S7/exec"
loading="eager">
</iframe>

<!-- LOADER -->

<div id="loader">

<div class="card">

<div class="icon">
💰
</div>

<h1>
Sistem Keuangan BLUD
</h1>

<p>
Manajemen Keuangan Digital<br>
Puskesmas Panjatan I
</p>

<div class="tag">
Transparansi • Akuntabilitas • Efisiensi
</div>

<div class="progress">
<div class="bar"></div>
</div>

<p>
Memuat sistem keuangan...
</p>

</div>

</div>

<script>

const loader = document.getElementById("loader");

document.getElementById("app").onload=function(){
setTimeout(()=>{
loader.classList.add("hide");
},400);
};

// fallback anti stuck
setTimeout(()=>{
loader.classList.add("hide");
},6000);

// PWA
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

<!-- BACK HOME -->

<a 
href="https://puskesmaspanjatansatu.github.io/portal-digital/"
class="back-home"
title="Kembali ke Portal Digital">

🏠

</a>

</body>
</html>
