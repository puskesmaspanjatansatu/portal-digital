<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>Sistem Keuangan BLUD</title>

<meta name="theme-color" content="#1e293b">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:#020617;
}

iframe{
position:fixed;
inset:0;
width:100%;
height:100%;
border:0;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
z-index:9999;
display:flex;
align-items:center;
justify-content:center;

background:radial-gradient(circle at top,#1e293b,#020617 70%);
transition:.5s;
}

.hide{
opacity:0;
visibility:hidden;
}

.card{
width:90%;
max-width:360px;
padding:35px 25px;
text-align:center;
border-radius:30px;

background:rgba(148,163,184,.08);
backdrop-filter:blur(20px);
border:1px solid #94a3b833;

color:#f1f5f9;
box-shadow:0 20px 60px #0008;
}

/* =====================
   KEUANGAN ANIMATION
===================== */

.icon{
width:120px;
height:120px;
margin:auto;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* grafik batang */

.chart{
display:flex;
gap:6px;
align-items:flex-end;
height:60px;
}

.bar{
width:12px;
background:#facc15;
border-radius:4px;
animation:grow 1.5s infinite ease-in-out;
}

.bar:nth-child(2){height:40px;animation-delay:.2s;}
.bar:nth-child(3){height:55px;animation-delay:.4s;}
.bar:nth-child(4){height:70px;animation-delay:.6s;}

/* koin */

.coin{
position:absolute;
top:-10px;
right:10px;
width:35px;
height:35px;
border-radius:50%;
background:#facc15;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:#1e293b;
box-shadow:0 0 15px #facc1588;
animation:float 2s infinite;
}

/* animasi */

@keyframes grow{
0%{transform:scaleY(.3);}
50%{transform:scaleY(1);}
100%{transform:scaleY(.5);}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

/* TEXT */

h1{
margin-top:20px;
font-size:24px;
letter-spacing:2px;
color:#facc15;
}

p{
margin-top:12px;
color:#e2e8f0;
line-height:1.6;
}

.location{
margin-top:18px;
font-size:13px;
letter-spacing:2px;
color:#cbd5f5;
}

/* PROGRESS */

.progress{
margin-top:25px;
height:7px;
border-radius:20px;
background:#1e293b;
overflow:hidden;
}

.progressbar{
height:100%;
width:40%;
background:#facc15;
animation:load 1.2s infinite;
}

@keyframes load{
0%{transform:translateX(-120%)}
100%{transform:translateX(300%)}
}

</style>

</head>

<body>

<!-- IFRAME -->

<iframe
id="app"
src="https://script.google.com/a/~/macros/s/AKfycbzrBhpP8mj_UuJIs-QlIj3PyEPg4M9SxfSAByRAPY49JpI_BeGvIYOh-dRLOP2paZve5g/exec"
allow="geolocation *;camera *;microphone *"
loading="eager">
</iframe>

<!-- LOADING -->

<div id="loader">

<div class="card">

<div class="icon">

<div class="chart">
<div class="bar" style="height:30px"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="coin">Rp</div>

</div>

<h1>KEUANGAN BLUD</h1>

<p>
PUSPANSA<br>
Anggaran • Kas • Laporan
</p>

<div class="location">
PUSKESMAS PANJATAN I
</div>

<div class="progress">
<div class="progressbar"></div>
</div>

<p>
Memuat sistem keuangan...
</p>

</div>

</div>

<script>

const loader = document.getElementById("loader");

document.getElementById("app").onload=function(){
setTimeout(()=>{
loader.classList.add("hide");
},300);
};

// fallback
setTimeout(()=>{
loader.classList.add("hide");
},6000);

</script>

</body>
</html>
