<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>
SAPA PANJI V2 | Saluran Aspirasi dan Pengaduan Puskesmas Panjatan I
</title>

<link rel="icon"
href="https://lh3.googleusercontent.com/d/1MIRHMi7eVL9qDRNW-SDs4NxR1WXx-ixk">

<!-- FAST LOADING -->
<link rel="preconnect" href="https://script.google.com">
<link rel="dns-prefetch" href="//script.google.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
background:#ffffff;
font-family:'Segoe UI',sans-serif;
}

body{
position:fixed;
inset:0;
}

/* FULLSCREEN */

.iframe-container{
position:fixed;
inset:0;
width:100vw;
height:100dvh;
background:#ffffff;
overflow:hidden;
}

iframe{
position:absolute;
inset:0;
width:100%;
height:100%;
border:none;
display:block;
background:#ffffff;
}

/* SPLASH */

.loader-screen{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#07162d,
#0b4b8f,
#0f766e
);

overflow:hidden;

z-index:9999;

transition:
opacity .6s ease,
visibility .6s ease;
}

/* GLOW */

.glow{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.35;
}

.glow1{
width:280px;
height:280px;
background:#0ea5e9;
top:-120px;
left:-120px;
}

.glow2{
width:280px;
height:280px;
background:#10b981;
right:-120px;
bottom:-120px;
}

/* CARD */

.loader-box{

position:relative;
z-index:10;

width:92%;
max-width:420px;

padding:30px 24px;

text-align:center;

border-radius:32px;

background:
rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,.15);

box-shadow:
0 20px 60px rgba(0,0,0,.25);

color:white;
}

/* LOGO */

.logo-circle{

width:90px;
height:90px;

margin:auto;

padding:8px;

background:white;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 8px 25px rgba(0,0,0,.2);

animation:float 3s ease infinite;
}

.logo-circle img{

width:100%;
height:100%;

object-fit:contain;

border-radius:50%;
}

/* TEXT */

.app-title{

margin-top:20px;

font-size:1.55rem;
font-weight:700;

line-height:1.4;
}

.subtitle{

margin-top:12px;

font-size:1rem;

line-height:1.7;

color:#dbeafe;
}

.tagline{

margin-top:10px;

font-size:.82rem;

font-weight:600;

letter-spacing:1px;

color:#7dd3fc;

text-transform:uppercase;
}

/* PROGRESS */

.progress{

margin-top:24px;

width:100%;
height:10px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.15);
}

.progress-bar{

width:100%;
height:100%;

border-radius:999px;

background:
linear-gradient(
90deg,
#00d4ff,
#14b8a6,
#00d4ff
);

background-size:200% 100%;

animation:
shimmer 1.5s linear infinite;
}

.loading-text{

margin-top:15px;

font-size:.92rem;

color:#e2e8f0;
}

/* MOBILE */

@media(max-width:600px){

.loader-box{
max-width:340px;
padding:24px 18px;
}

.logo-circle{
width:75px;
height:75px;
}

.app-title{
font-size:1.2rem;
}

.subtitle{
font-size:.9rem;
}

.loading-text{
font-size:.82rem;
}

}

/* ANIMATION */

@keyframes shimmer{

0%{
background-position:0% 50%;
}

100%{
background-position:200% 50%;
}

}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

}

.fade-out{
opacity:0;
visibility:hidden;
pointer-events:none;
}

</style>
</head>

<body>

<div class="iframe-container">

<div class="loader-screen" id="loader">

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="loader-box">

<div class="logo-circle">
<img
src="https://lh3.googleusercontent.com/d/1MIRHMi7eVL9qDRNW-SDs4NxR1WXx-ixk"
alt="Logo">
</div>

<div class="app-title">
SAPA PANJI V2
</div>

<div class="subtitle">
Saluran Aspirasi, Pengaduan,<br>
Saran & Inovasi<br>
Puskesmas Panjatan I
</div>

<div class="tagline">
Suara Anda Menginspirasi Perubahan
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="loading-text">
Memuat aplikasi...
</div>

</div>

</div>

<iframe
src="https://script.google.com/a/~/macros/s/AKfycbwRWrby065ZCgATSzSyIWH6Pkqi6euB-eGGsaS9eZ7DW9WZAR--QNfXMnpIznKWIsi8KQ/exec"
title="SAPA PANJI V2"
loading="eager"
allowfullscreen
onload="startHideLoader()">
</iframe>

</div>

<script>

function startHideLoader(){

setTimeout(function(){

document
.getElementById('loader')
.classList.add('fade-out');

},500);

}

</script>

</body>
</html>
