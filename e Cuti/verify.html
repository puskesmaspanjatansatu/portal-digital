<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Verifikasi e-Cuti | Panjatan I</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #002d5c 100%);
      background-attachment: fixed;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 420px; height: 420px; background: rgba(0,82,162,0.35); top: -120px; left: -100px; }
    .blob-2 { width: 300px; height: 300px; background: rgba(0,89,48,0.25); bottom: -80px; right: -80px; }

    .card {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 380px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 28px;
      padding: 40px 32px 36px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
      animation: slideUp 0.6s cubic-bezier(0.2,0.8,0.2,1) forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 64px; height: 64px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
    }

    h1 {
      color: #fff;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .sub {
      color: rgba(147,197,253,0.7);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ---- States ---- */
    .state { display: none; }
    .state.active { display: block; }

    /* Loading */
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-label {
      color: rgba(255,255,255,0.75);
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.6;
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      height: 4px;
      margin-top: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #10b981);
      border-radius: 99px;
      animation: progress 1.2s ease forwards;
    }
    @keyframes progress {
      from { width: 0%; }
      to   { width: 100%; }
    }

    /* Error */
    .error-icon { font-size: 44px; margin-bottom: 14px; }
    .error-text { color: rgba(255,255,255,0.7); font-size: 0.88rem; line-height: 1.6; margin-bottom: 20px; }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #0052a2, #005930);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 18px rgba(0,0,0,0.3);
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }

    .footer {
      margin-top: 28px;
      color: rgba(255,255,255,0.2);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="icon-wrap">🏥</div>
    <h1>e-Cuti Panjatan I</h1>
    <p class="sub">Sistem Verifikasi Digital</p>

    <!-- State: Loading -->
    <div class="state active" id="stateLoading">
      <div class="spinner"></div>
      <p class="state-label">Memverifikasi tautan…<br>Mengarahkan ke halaman verifikasi.</p>
      <div class="progress-wrap"><div class="progress-bar"></div></div>
    </div>

    <!-- State: Error -->
    <div class="state" id="stateError">
      <div class="error-icon">⚠️</div>
      <p class="error-text" id="errMsg">Link tidak valid atau sudah kadaluwarsa.<br>Hubungi admin untuk link baru.</p>
      <a class="btn" href="https://puskesmaspanjatansatu.github.io/portal-digital/">Kembali ke Portal</a>
    </div>

    <p class="footer">Puskesmas Panjatan I · Kulon Progo · DIY</p>
  </div>

  <script>
    // ============================================================
    // GAS_URL: URL deployment Google Apps Script anda
    // ============================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwTENw1edMRLAPWIRck5ZfCnResjeq3jYjKXkiVRJoVPHqOVYmOtROxF1anUoD8m0tm/exec';

    function showError(msg) {
      document.getElementById('stateLoading').classList.remove('active');
      const el = document.getElementById('stateError');
      el.classList.add('active');
      if (msg) document.getElementById('errMsg').innerHTML = msg;
    }

    (function init() {
      const p = new URLSearchParams(window.location.search);
      const role  = p.get('role');
      const token = p.get('token');

      if (!role || !token) {
        showError('Parameter tidak lengkap.<br>Pastikan link yang anda gunakan benar.');
        return;
      }

      if (!['DLG', 'PJ'].includes(role)) {
        showError('Role tidak dikenali: <b>' + role + '</b>');
        return;
      }

      // Redirect ke GAS setelah animasi selesai (1.2 detik)
      const dest = GAS_URL
        + '?action=verify'
        + '&role='  + encodeURIComponent(role)
        + '&token=' + encodeURIComponent(token);

      setTimeout(() => { window.location.href = dest; }, 1200);
    })();
  </script>

</body>
</html>
