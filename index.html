<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>e-Portal Digital | Puskesmas Panjatan I</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root{
--primary:#2563eb;
--glass:rgba(255,255,255,.1);
--border:rgba(255,255,255,.2);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#1d4ed8,#0ea5e9);
color:white;
min-height:100vh;
}

/* HEADER */
.header{
text-align:center;
padding:40px 20px;
}

.logo{
width:100px;
height:100px;
margin:auto;
border-radius:50%;
background:var(--glass);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.title{
font-size:2rem;
margin-top:20px;
}

.clock{
margin-top:10px;
}

/* SEARCH */
.search-wrap{
max-width:600px;
margin:20px auto;
padding:0 20px;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:20px;
background:var(--glass);
color:white;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
padding:20px;
border-radius:20px;
background:var(--glass);
border:1px solid var(--border);
cursor:pointer;
transition:.3s;
text-decoration:none;
color:white;
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:30px;
margin-bottom:10px;
}

/* MODAL */
.modal{


display:none;

position:fixed;

inset:0;

background:
rgba(2,6,23,.75);

backdrop-filter:
blur(10px);

align-items:center;

justify-content:center;

z-index:9999;


}



.modal-box{


width:90%;

max-width:380px;


padding:35px;


border-radius:30px;


background:

linear-gradient(
135deg,
#ffffff,
#dbeafe
);


color:#0f172a;


text-align:center;


animation:

pop .35s ease;


box-shadow:

0 25px 60px #0006;


}



.modal-box h2{

font-size:30px;

background:
linear-gradient(
90deg,
#2563eb,
#06b6d4
);

-webkit-background-clip:text;

color:transparent;


}



.rocket{


font-size:80px;


animation:

rocket 1.5s infinite;


}



@keyframes pop{


from{

transform:scale(.5);

opacity:0;

}


to{

transform:scale(1);

opacity:1;

}


}



@keyframes rocket{


0%,100%{

transform:
translateY(0)
rotate(0deg);

}


50%{

transform:
translateY(-15px)
rotate(8deg);

}


}
/* TOP BUTTON */
#topBtn{
position:fixed;
right:20px;
bottom:150px;
display:none;
}

/* OFFLINE BAR */
#offlineBar{
position:fixed;
top:0;
left:0;
right:0;
background:#ef4444;
color:white;
text-align:center;
padding:8px;
display:none;
z-index:9999;
}
</style>
</head>

<body>
<!-- BACK TO PORTAL DIGITAL -->




<style>

.back-home{

position:fixed;

top:18px;
left:18px;


display:flex;
align-items:center;
gap:8px;


padding:12px 18px;


border-radius:30px;


background:
rgba(37,99,235,.85);


color:white;

text-decoration:none;


font-size:14px;

font-weight:600;


z-index:99999;


box-shadow:
0 10px 30px rgba(0,0,0,.35);


backdrop-filter:
blur(15px);


transition:.3s;


}


.back-home:hover{

transform:
translateY(-5px)
scale(1.05);


}


@media(max-width:600px){

.back-home span{

display:none;

}


.back-home{

width:48px;
height:48px;

justify-content:center;

padding:0;

font-size:22px;

}

}


</style>

<!-- OFFLINE -->
<div id="offlineBar">📡 Mode Offline Aktif</div>

<!-- HEADER -->
<header class="header">
<div class="logo">🏥</div>

<h1 class="title">e-Portal Digital</h1>

<div class="clock"></div>

<div>
👥 Pengunjung:
<span id="visitor">0</span>
</div>
</header>

<!-- SEARCH -->
<div class="search-wrap">
<input type="text" id="searchApp" class="search" placeholder="Cari aplikasi...">
</div>

<!-- APPS -->
<div class="grid">

<a class="card" href="./ePortalDigital/">
<div class="icon">🌐</div>
<div>e-Portal</div>
</a>

<a class="card" href="./sigap/">
<div class="icon">📍</div>
<div>SIGAP</div>
</a>

<div class="card" onclick="comingSoon()">
<div class="icon">👥</div>
<div>PAMAN PANJI</div>
</div>

<div class="card" onclick="comingSoon()">
<div class="icon">📅</div>
<div>e-Cuti</div>
</div>

</div>

<!-- MODAL -->
<div id="comingModal" class="modal">
<div class="modal-box">
<div class="rocket">
🚀
</div>


<h2>
Coming Soon
</h2>


<p>

Fitur sedang dipersiapkan.
<br>

Akan hadir pada update berikutnya.

</p>


<br>

<div style="
height:8px;
background:#ddd;
border-radius:20px;
overflow:hidden;
">

<div style="
width:70%;
height:100%;
background:
linear-gradient(
90deg,
#2563eb,
#22c55e
);
animation:load 2s infinite;
">
</div>

</div>
<button onclick="closeComing()">Tutup</button>
</div>
</div>

<!-- INSTALL BUTTON -->
<button id="installBtn"
style="
position:fixed;
right:20px;
bottom:20px;
padding:12px 18px;
border:none;
border-radius:30px;
background:#2563eb;
color:white;
z-index:999;
display:none;
">
📲 Install App
</button>

<!-- WHATSAPP -->
<a href="https://wa.me/6281234567890"
target="_blank"
style="
position:fixed;
right:20px;
bottom:80px;
width:55px;
height:55px;
border-radius:50%;
background:#25D366;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
text-decoration:none;
z-index:999;
">
💬
</a>

<!-- TOP -->
<button id="topBtn" onclick="scrollTopPage()">↑</button>

<script>

// ================= VISITOR =================
let visitor = localStorage.getItem("visitor") || 0;
visitor++;
localStorage.setItem("visitor", visitor);
document.getElementById("visitor").innerText = visitor;


// ================= CLOCK =================
function updateClock(){
let now = new Date();
document.querySelectorAll(".clock").forEach(el=>{
el.innerHTML = now.toLocaleTimeString("id-ID");
});
}
setInterval(updateClock,1000);
updateClock();


// ================= SEARCH =================
document.getElementById("searchApp")
.addEventListener("input", function(){

let input = this.value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card=>{
let text = card.innerText.toLowerCase();
card.style.display =
text.includes(input) ? "block" : "none";
});

});


// ================= MODAL =================
function comingSoon(){
document.getElementById("comingModal").style.display="flex";
}

function closeComing(){
document.getElementById("comingModal").style.display="none";
}


// ================= SCROLL =================
window.onscroll=function(){
document.getElementById("topBtn").style.display =
document.documentElement.scrollTop>200 ? "block":"none";
}

function scrollTopPage(){
window.scrollTo({top:0,behavior:"smooth"});
}


// ================= PWA INSTALL =================
let deferredPrompt;

window.addEventListener("beforeinstallprompt", e=>{
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").onclick = async()=>{
if(deferredPrompt){
deferredPrompt.prompt();
await deferredPrompt.userChoice;
deferredPrompt = null;
}
};


// ================= SERVICE WORKER =================
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./service-worker.js")
.then(()=>console.log("Service Worker Aktif"));
}


// ================= OFFLINE =================
function checkOnline(){
document.getElementById("offlineBar").style.display =
navigator.onLine ? "none":"block";
}

window.addEventListener("online",checkOnline);
window.addEventListener("offline",checkOnline);
checkOnline();

</script>

</body>
