<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Geo Location Report | Puspansa</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:linear-gradient(160deg,#020617,#0f172a,#020617);
font-family:'Segoe UI',system-ui,sans-serif;
overflow:hidden;
}

/* iframe */

iframe{
position:fixed;
inset:0;
width:100%;
height:100%;
border:0;
background:#fff;
}

/* loader */

#loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
background:radial-gradient(circle at top,#0ea5e9,#020617 70%);
transition:.6s;
}

.hide{
opacity:0;
visibility:hidden;
}

/* CARD */

.card{
width:92%;
max-width:380px;
padding:30px;
border-radius:26px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);

color:#e2e8f0;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,.5);
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.dot{
width:10px;
height:10px;
background:#38bdf8;
border-radius:50%;
box-shadow:0 0 12px #38bdf8;
animation:pulse 1.8s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);opacity:1}
50%{transform:scale(1.6);opacity:.5}
}

.label{
font-size:12px;
color:#94a3b8;
letter-spacing:1px;
}

/* MAP ICON ANIMATION */

.map{
position:relative;
height:100px;
margin:25px 0;
}

/* pin */

.pin{
width:18px;
height:18px;
background:#0ea5e9;
border-radius:50%;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 15px #0ea5e9;
}

/* ripple */

.ripple{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border:2px solid #38bdf8;
border-radius:50%;
animation:ripple 2s infinite;
}

.ripple:nth-child(1){width:40px;height:40px}
.ripple:nth-child(2){width:70px;height:70px;animation-delay:.5s}
.ripple:nth-child(3){width:100px;height:100px;animation-delay:1s}

@keyframes ripple{
0%{opacity:.7;transform:translate(-50%,-50%) scale(.5)}
100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}
}

/* glow */

.glow{
position:absolute;
width:120px;
height:120px;
background:#0ea5e9;
filter:blur(80px);
opacity:.25;
top:-40px;
right:-40px;
animation:float 5s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(20px)}
}

/* TEXT */

h1{
font-size:20px;
color:#38bdf8;
margin-top:10px;
}

p{
margin-top:10px;
font-size:14px;
color:#cbd5f5;
}

/* PROGRESS */

.progress{
margin-top:20px;
height:5px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:40%;
background:linear-gradient(90deg,#0ea5e9,#38bdf8);
animation:load 1.4s infinite;
}

@keyframes load{
0%{transform:translateX(-120%)}
100%{transform:translateX(300%)}
}

/* HOME */

.home{
position:fixed;
bottom:18px;
right:18px;
width:52px;
height:52px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(15,23,42,.6);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(10px);
z-index:99999;
transition:.3s;
}

.home:hover{
background:#0ea5e9;
transform:translateY(-3px);
}

.home svg{
width:24px;
fill:#fff;
}

</style>

</head>

<body>

<iframe
id="app"
src="https://script.google.com/a/~/macros/s/AKfycbwobs7CSBLYeRWdi6jh26OcV7ghPl1AYojzxI1TrG6r6D-xAJlmxJHoZvDz4bhU-liw/exec"
allow="geolocation">
</iframe>

<div id="loader">

<div class="card">

<div class="glow"></div>

<div class="header">
<span class="label">GEO SYSTEM</span>
<div class="dot"></div>
</div>

<div class="map">

<div class="ripple"></div>
<div class="ripple"></div>
<div class="ripple"></div>

<div class="pin"></div>

</div>

<h1>GEO LOCATION REPORT</h1>

<p>
Pelaporan & Tracking Lokasi<br>
Puskesmas Panjatan I
</p>

<div class="progress">
<div class="bar"></div>
</div>

<p>Memuat data lokasi...</p>

</div>

</div>

<!-- HOME -->

<a href="https://puskesmaspanjatansatu.github.io/portal-digital/" class="home">
<svg viewBox="0 0 24 24">
<path d="M12 3.1 2.6 11a1 1 0 0 0 .64 1.77H5v7a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-7h1.76A1 1 0 0 0 21.4 11L12 3.1z"/>
</svg>
</a>

<script>

const loader=document.getElementById("loader");

document.getElementById("app").onload=()=>{
setTimeout(()=>loader.classList.add("hide"),400);
};

setTimeout(()=>loader.classList.add("hide"),8000);

</script>

</body>
</html>
