<head>

content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>
SAPA PANJI V2 | Saluran Aspirasi dan Pengaduan Puskesmas Panjatan I

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#ffffff;
font-family:'Segoe UI',sans-serif;
}

body{
position:fixed;
inset:0;
}

/* FULLSCREEN */

.iframe-container{
position:fixed;
inset:0;
width:100vw;
height:100dvh;
background:#ffffff;
overflow:hidden;
}

iframe{
position:absolute;
inset:0;
width:100%;
height:100%;
border:none;
display:block;
background:#ffffff;
}

/* SPLASH */

.loader-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#07162d,
#0b4b8f,
#0f766e
);

overflow:hidden;
z-index:9999;

transition:opacity .6s ease, visibility .6s ease;
}

/* GLOW */

.glow{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.35;
}

.glow1{
width:280px;
height:280px;
background:#0ea5e9;
top:-120px;
left:-120px;
}

.glow2{
width:280px;
height:280px;
background:#10b981;
right:-120px;
bottom:-120px;
}

/* CARD */

.loader-box{
position:relative;
z-index:10;

width:92%;
max-width:420px;

padding:30px 24px;
text-align:center;

border-radius:32px;

background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 20px 60px rgba(0,0,0,.25);
color:white;
}

/* LOGO */

.logo-circle{
width:90px;
height:90px;

margin:auto;
padding:8px;

background:white;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

box-shadow:0 8px 25px rgba(0,0,0,.2);

animation:float 3s ease infinite;
}

.logo-circle img{
width:100%;
height:100%;
object-fit:contain;
border-radius:50%;
}

/* TEXT */

.app-title{
margin-top:20px;
font-size:1.55rem;
font-weight:700;
line-height:1.4;
}

.subtitle{
margin-top:12px;
font-size:1rem;
line-height:1.7;
color:#dbeafe;
}

.tagline{
margin-top:10px;
font-size:.82rem;
font-weight:600;
letter-spacing:1px;
color:#7dd3fc;
text-transform:uppercase;
}

/* PROGRESS */

.progress{
margin-top:24px;
width:100%;
height:10px;
border-radius:999px;
overflow:hidden;
background:rgba(255,255,255,.15);
}

.progress-bar{
width:100%;
height:100%;
border-radius:999px;

background:linear-gradient(
90deg,
#00d4ff,
#14b8a6,
#00d4ff
);

background-size:200% 100%;
animation:shimmer 1.5s linear infinite;
}

.loading-text{
margin-top:15px;
font-size:.92rem;
color:#e2e8f0;
}

/* ANIMATION */

@keyframes shimmer{
0%{ background-position:0% 50%; }
100%{ background-position:200% 50%; }
}

@keyframes float{
0%,100%{ transform:translateY(0); }
50%{ transform:translateY(-8px); }
}

.fade-out{
opacity:0;
visibility:hidden;
pointer-events:none;
}

/* ========================= */
/* BACK HOME BUTTON */
/* ========================= */

.back-home{

position:fixed;
right:20px;
bottom:20px;

width:60px;
height:60px;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

background:linear-gradient(135deg,#0ea5e9,#10b981);

color:white;
text-decoration:none;
font-size:26px;

z-index:99999;

box-shadow:0 12px 30px rgba(0,0,0,.35);

overflow:hidden;
transition:.2s;
}

/* PRESS EFFECT */
.back-home:active{
transform:scale(.9);
}

/* RIPPLE EFFECT */
.back-home::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(255,255,255,.4);
border-radius:50%;
transform:scale(0);
opacity:0;
transition:.4s;
}

.back-home:active::after{
transform:scale(1.6);
opacity:1;
transition:0s;
}

/* HOVER */
.back-home:hover{
transform:translateY(-5px) scale(1.05);
}

/* MOBILE */

@media(max-width:600px){
.back-home{
right:15px;
bottom:15px;
width:52px;
height:52px;
font-size:22px;
}
}

</style>
</head>

<body>

<div class="iframe-container">

<div class="loader-screen" id="loader">

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="loader-box">

<div class="logo-circle">
<img src="https://lh3.googleusercontent.com/d/1MIRHMi7eVL9qDRNW-SDs4NxR1WXx-ixk">
</div>

<div class="app-title">SAPA PANJI V2</div>

<div class="subtitle">
Saluran Aspirasi, Pengaduan,<br>
Saran & Inovasi<br>
Puskesmas Panjatan I
</div>

<div class="tagline">
Suara Anda Menginspirasi Perubahan
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="loading-text">
Memuat aplikasi...
</div>

</div>
</div>

<iframe
src="https://script.google.com/a/~/macros/s/AKfycbwRWrby065ZCgATSzSyIWH6Pkqi6euB-eGGsaS9eZ7DW9WZAR--QNfXMnpIznKWIsi8KQ/exec"
loading="eager"
onload="startHideLoader()">
</iframe>

</div>

<script>

function startHideLoader(){
setTimeout(()=>{
document.getElementById('loader')
.classList.add('fade-out');
},500);
}

</script>

<!-- BACK HOME BUTTON -->

<a 
href="https://puskesmaspanjatansatu.github.io/portal-digital/"
class="back-home"
title="Kembali ke Portal Digital">

</a>

</body>
</html>
